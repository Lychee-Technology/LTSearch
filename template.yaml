AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >-
  LTSearch production deployment: Lambda ZIP (provided.al2023 / arm64),
  HTTP API front for write/query, SQS-triggered index builder with
  partial-batch failure redrive. (#109)

Parameters:
  EmbeddingProvider:
    Type: String
    Default: ltembed
    Description: >-
      LTSEARCH_*_EMBEDDING_PROVIDER for build/query. 默认 ltembed（jina/512
      生产档，#94 裁决）：需要 real 模式产物（package-lambda-zips.sh 以
      LTSEARCH_LTEMBED_MODE=real 打包），并把 package-model-assets.sh 产出的
      dist/model-assets/ 上传到 ArtifactBucket 的 ModelAssetPrefix 前缀下
      （#111，冷启动 S3→/tmp 供给）。冒烟/e2e 用 stub 产物时覆盖为 fixed。
  EmbeddingDim:
    Type: String
    Default: '512'
    Description: >-
      LTSEARCH_BUILD_EMBEDDING_DIM。默认 512 对应 ltembed 生产档（#94）；
      EmbeddingProvider=fixed 冒烟时改为 FixedEmbedding 向量的维数（如 3）。
  FixedEmbedding:
    Type: String
    Default: '0.9,0.1,0.0'
    Description: >-
      仅 EmbeddingProvider=fixed 时使用的固定向量（冒烟用）；ltembed 下忽略。
  ModelAssetPrefix:
    Type: String
    Default: ltembed/v1.0.9
    Description: >-
      ArtifactBucket 内的 LTEmbed 模型资产前缀（manifest.json + model.ort 等，
      由 scripts/package-model-assets.sh 产出并上传）。query/build 冷启动按
      manifest 逐文件 sha256 校验下载到 /tmp/ltembed（#111）。与
      sam/builder.Dockerfile 的 bundle pin 同步 bump。

Globals:
  Function:
    Runtime: provided.al2023
    Handler: bootstrap
    Architectures:
      - arm64
    Timeout: 30
    MemorySize: 1024

Resources:
  ArtifactBucket:
    Type: AWS::S3::Bucket

  BuildDeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600

  BuildQueue:
    Type: AWS::SQS::Queue
    Properties:
      # timeout-safe：≥ 6 × BuildFunction Timeout(900s)，避免在途消息被重复投递。
      VisibilityTimeout: 5400
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt BuildDeadLetterQueue.Arn
        maxReceiveCount: 3

  WriteFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/write_lambda/
      Events:
        WriteApi:
          Type: HttpApi
          Properties:
            Path: /write
            Method: post
        DeleteApi:
          Type: HttpApi
          Properties:
            Path: /delete
            Method: post
      Environment:
        Variables:
          LTSEARCH_WRITE_S3_BUCKET: !Ref ArtifactBucket
          LTSEARCH_WRITE_SQS_QUEUE_URL: !Ref BuildQueue
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ArtifactBucket
        - SQSSendMessagePolicy:
            QueueName: !GetAtt BuildQueue.QueueName

  QueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/query_lambda/
      MemorySize: 3008
      Events:
        QueryApi:
          Type: HttpApi
          Properties:
            Path: /query
            Method: post
      Environment:
        Variables:
          LTSEARCH_QUERY_S3_BUCKET: !Ref ArtifactBucket
          LTSEARCH_QUERY_ARTIFACT_ROOT: /tmp/ltsearch-artifacts
          LTSEARCH_QUERY_EMBEDDING_PROVIDER: !Ref EmbeddingProvider
          LTSEARCH_QUERY_FIXED_EMBEDDING: !Ref FixedEmbedding
          # 模型资产 S3→/tmp 冷启动供给（#111）；fixed 冒烟档下这些变量被忽略。
          LTSEARCH_QUERY_LTEMBED_S3_BUCKET: !Ref ArtifactBucket
          LTSEARCH_QUERY_LTEMBED_S3_PREFIX: !Ref ModelAssetPrefix
          LTSEARCH_QUERY_LTEMBED_BUNDLE_DIR: /tmp/ltembed
          LTSEARCH_QUERY_LTEMBED_MODEL_PATH: /tmp/ltembed/model.ort
      Policies:
        - S3ReadPolicy:
            BucketName: !Ref ArtifactBucket

  BuildFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: dist/index_builder_lambda/
      Timeout: 900
      MemorySize: 3008
      Events:
        BuildQueueEvent:
          Type: SQS
          Properties:
            Queue: !GetAtt BuildQueue.Arn
            BatchSize: 1
            FunctionResponseTypes:
              - ReportBatchItemFailures
      Environment:
        Variables:
          LTSEARCH_BUILD_S3_BUCKET: !Ref ArtifactBucket
          LTSEARCH_BUILD_ARTIFACT_ROOT: /tmp/ltsearch-artifacts
          LTSEARCH_BUILD_EMBEDDING_PROVIDER: !Ref EmbeddingProvider
          LTSEARCH_BUILD_EMBEDDING_DIM: !Ref EmbeddingDim
          LTSEARCH_BUILD_FIXED_EMBEDDING: !Ref FixedEmbedding
          # 模型资产 S3→/tmp 冷启动供给（#111）；fixed 冒烟档下这些变量被忽略。
          LTSEARCH_BUILD_LTEMBED_S3_BUCKET: !Ref ArtifactBucket
          LTSEARCH_BUILD_LTEMBED_S3_PREFIX: !Ref ModelAssetPrefix
          LTSEARCH_BUILD_LTEMBED_BUNDLE_DIR: /tmp/ltembed
          LTSEARCH_BUILD_LTEMBED_MODEL_PATH: /tmp/ltembed/model.ort
      Policies:
        - S3CrudPolicy:
            BucketName: !Ref ArtifactBucket
        - SQSPollerPolicy:
            QueueName: !GetAtt BuildQueue.QueueName

Outputs:
  ApiUrl:
    Description: HTTP API base URL (POST /write, /delete, /query)
    Value: !Sub 'https://${ServerlessHttpApi}.execute-api.${AWS::Region}.amazonaws.com'
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
  BuildQueueUrl:
    Value: !Ref BuildQueue
