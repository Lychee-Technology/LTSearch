name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fast:
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: python3 -m pip install --upgrade pip awscli
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - run: python3 -B tests/test_ci_workflow.py
      - run: python3 -B tests/test_readme_workflow.py
      - run: bash scripts/verify-fast.sh

  integration:
    needs: fast
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - run: docker compose -f docker-compose.moto.yml up -d
      - run: bash scripts/verify-moto.sh
      - if: always()
        run: docker compose -f docker-compose.moto.yml down -v

  sam-e2e:
    needs: integration
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - run: python3 -B tests/test_sam_invoke_e2e.py
      - run: docker compose -f docker-compose.moto.yml up -d
      - run: bash scripts/e2e/run-sam-local-invoke-e2e.sh
      - if: always()
        run: docker compose -f docker-compose.moto.yml down -v
