name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fast:
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: python3 -m pip install --upgrade pip awscli
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - run: python3 -B tests/test_ci_workflow.py
      - run: python3 -B tests/test_readme_workflow.py
      - run: bash scripts/verify-fast.sh

  integration:
    needs: fast
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - run: docker compose -f docker-compose.moto.yml up -d
      - run: bash scripts/verify-moto.sh
      - if: always()
        run: docker compose -f docker-compose.moto.yml down -v

  sam-e2e:
    needs: integration
    runs-on: [self-hosted, Linux, ARM64]
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - run: python3 -B tests/test_sam_invoke_e2e.py
      - run: python3 -m pip install --upgrade pip awscli aws-sam-cli
      - name: Enable Docker BuildKit
        run: |
          existing=$(cat /etc/docker/daemon.json 2>/dev/null || echo '{}')
          echo "$existing" | python3 -c "
          import json, sys
          d = json.load(sys.stdin)
          d.setdefault('features', {})['buildkit'] = True
          print(json.dumps(d))
          " | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          timeout 30 bash -c 'until docker info >/dev/null 2>&1; do sleep 1; done'
      - run: docker compose -f docker-compose.moto.yml up -d
      - run: bash scripts/e2e/run-sam-local-invoke-e2e.sh
      - if: always()
        run: docker compose -f docker-compose.moto.yml down -v
