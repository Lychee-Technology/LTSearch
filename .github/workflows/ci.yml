name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  fast:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: python3 -m pip install --upgrade pip awscli
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - run: python3 -B tests/test_ci_workflow.py
      - run: python3 -B tests/test_readme_workflow.py
      - run: bash scripts/verify-fast.sh

  feature-matrix:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: local profile builds AWS-free
        run: |
          cargo build --no-default-features --features local
          for pkg in aws-config aws-sdk-s3 aws-sdk-sqs lambda_runtime; do
            if cargo tree --no-default-features --features local -i "$pkg" >/dev/null 2>&1; then
              echo "::error::$pkg leaked into the local build graph"; exit 1
            fi
          done
      - name: local profile tests
        run: cargo test --no-default-features --features local --lib --tests
      - name: aws profile builds + tests
        run: |
          cargo build --no-default-features --features aws
          cargo test --no-default-features --features aws --lib --test runtime_aws_test
      - name: lambda profile builds
        run: cargo build --no-default-features --features lambda --bin query_lambda --bin write_lambda --bin index_builder_lambda
      - name: lambda bin unit tests
        run: cargo test --no-default-features --features lambda --bins

  integration:
    needs: fast
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - run: docker compose -f docker-compose.moto.yml up -d
      - run: bash scripts/verify-moto.sh
      - if: always()
        run: docker compose -f docker-compose.moto.yml down -v

  sam-e2e:
    needs: integration
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - run: python3 -B tests/test_sam_invoke_e2e.py
      - run: python3 -m pip install --upgrade pip awscli aws-sam-cli
      - run: docker compose -f docker-compose.moto.yml up -d
      - run: bash scripts/e2e/run-sam-local-invoke-e2e.sh
      - if: always()
        run: docker compose -f docker-compose.moto.yml down -v

  sam-zip-e2e:
    needs: integration
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - run: python3 -B tests/test_lambda_zip_packaging.py
      - run: python3 -m pip install --upgrade pip awscli aws-sam-cli
      - run: sam validate --lint --template-file template.yaml
      - run: docker compose -f docker-compose.moto.yml up -d
      - run: bash scripts/e2e/run-sam-zip-invoke-e2e.sh
      - if: always()
        run: docker compose -f docker-compose.moto.yml down -v

  # real 模式 ltembed ZIP 路径（#111，S3→/tmp）：strip 后函数 ZIP + 模型资产
  # 上传 moto + 250MB/hash/arch 预算守卫 + ltembed/512 全链路冷启动供给。
  # rust toolchain 供 cargo fetch 取 LTEmbed checkout。
  sam-ltembed-e2e:
    needs: integration
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - run: python3 -B tests/test_model_assets_packaging.py
      - run: python3 -m pip install --upgrade pip awscli aws-sam-cli
      - run: sam validate --lint --template-file template.yaml
      - run: docker compose -f docker-compose.moto.yml up -d
      - run: bash scripts/e2e/run-sam-ltembed-invoke-e2e.sh
      - if: always()
        run: docker compose -f docker-compose.moto.yml down -v

  http-e2e:
    needs: integration
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Build server images (stub embeddings)
        run: |
          docker build --platform linux/arm64 -f sam/builder.Dockerfile -t ltsearch-e2e-builder --build-arg LTEMBED_MODE=stub .
          docker build --platform linux/arm64 -f sam/write_server.Dockerfile -t ltsearch-write-server:dev .
          docker build --platform linux/arm64 -f sam/index_builder_server.Dockerfile -t ltsearch-index-builder-server:dev .
          docker build --platform linux/arm64 -f sam/query_server.Dockerfile -t ltsearch-query-server:dev .
          for img in ltsearch-write-server:dev ltsearch-index-builder-server:dev ltsearch-query-server:dev; do
            arch=$(docker inspect --format '{{.Architecture}}' "$img")
            [ "$arch" = arm64 ] || { echo "::error::$img is $arch, expected arm64"; exit 1; }
          done
      - name: Run HTTP flow
        run: |
          docker compose -f docker-compose.http.yml up -d --wait
          bash scripts/e2e/run-http-server-flow.sh
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.http.yml down -v

  local-image-e2e:
    needs: integration
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - name: Build single local image (self-contained, AWS-free)
        run: |
          docker build --platform linux/arm64 -f sam/local.Dockerfile -t ltsearch-local:dev .
          arch=$(docker inspect --format '{{.Architecture}}' ltsearch-local:dev)
          [ "$arch" = arm64 ] || { echo "::error::ltsearch-local:dev is $arch, expected arm64"; exit 1; }
      - name: Run moto-free restart flow
        run: |
          docker compose -f docker-compose.local.yml up -d --wait
          bash scripts/e2e/run-local-image-flow.sh
      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.local.yml down -v

  # 原生（无 Docker、moto-free）本地链路：3 个 ltsearch 子命令进程共享一个临时
  # LTSEARCH_LOCAL_ROOT，write→build→query + 全进程重启耐久性断言（epic #116 AC-2）。
  # 独立 job、无 needs:（#120）——不依赖任何 Docker/moto 前置，与 fast/feature-matrix
  # 并行给出最快的本地链路信号。
  local-e2e:
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.x'
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          cache: true
      - run: cargo build --no-default-features --features local --bin ltsearch
      - run: bash scripts/e2e/run-local-server-flow.sh
      # #112 PR-2 Task 14：静态 release v3 端到端流（build→activate→query）并入本地链路。
      - run: cargo build --locked --no-default-features --features local --example emit_static_lance_fixture
      - run: bash scripts/e2e/run-static-release-flow.sh
