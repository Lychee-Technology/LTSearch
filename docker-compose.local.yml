# 单镜像本地（AWS-free）端到端拓扑（#125）：同一个镜像跑
# write / build / query 三个角色（仅 command: 不同），共享一个命名卷承载 SQLite
# 控制面（ltsearch.db：耐久事件 / 构建队列 / 活跃指针）与不可变制品
# （lance/、index/、版本 manifest）。无 moto、无 aws-init、无任何 AWS 环境变量。
# 重启语义：`down`（不带 -v）保留卷 → `up` 后 query 仍服务已建版本、builder 仍
# 能从持久化队列继续消费（见 scripts/e2e/run-local-image-flow.sh）。
# 镜像经 LTSEARCH_LOCAL_IMAGE 选择：默认 ltsearch-local:dev（本地构建 / CI）；
# 消费 GHCR 发布镜像时设 LTSEARCH_LOCAL_IMAGE=ghcr.io/lychee-technology/ltsearch-local:<tag>
# （#113，见 docs/deployment.md）。
services:
  write:
    image: ${LTSEARCH_LOCAL_IMAGE:-ltsearch-local:dev}
    command: ["write"]
    environment: &localenv
      LTSEARCH_LOCAL_ROOT: /var/lib/ltsearch
      LTSEARCH_BUILD_EMBEDDING_PROVIDER: fixed
      LTSEARCH_BUILD_FIXED_EMBEDDING: "0.1,0.2,0.3"
      LTSEARCH_BUILD_EMBEDDING_DIM: "3"
      LTSEARCH_QUERY_EMBEDDING_PROVIDER: fixed
      LTSEARCH_QUERY_FIXED_EMBEDDING: "0.1,0.2,0.3"
    volumes:
      - ltsearch-data:/var/lib/ltsearch
    ports:
      - "127.0.0.1:19081:8080" # 仅供本仓库冒烟脚本
    healthcheck: &hc
      test: ["CMD", "curl", "-sf", "http://localhost:8080/health"]
      interval: 5s
      timeout: 3s
      retries: 12
    networks: [ltsearch-local]

  build:
    image: ${LTSEARCH_LOCAL_IMAGE:-ltsearch-local:dev}
    command: ["build"]
    environment:
      <<: *localenv
      # 默认启用后台队列 worker；设为 "false"/"0"/"no"/"off" 时仅服务显式
      # POST /build，供黑盒 E2E 显式发布流程使用（#140）。
      LTSEARCH_BUILD_WORKER_ENABLED: "true"
    volumes:
      - ltsearch-data:/var/lib/ltsearch
    healthcheck: *hc
    networks: [ltsearch-local]

  query:
    image: ${LTSEARCH_LOCAL_IMAGE:-ltsearch-local:dev}
    command: ["query"]
    environment: *localenv
    volumes:
      - ltsearch-data:/var/lib/ltsearch
    ports:
      - "127.0.0.1:19080:8080" # 仅供本仓库冒烟脚本
    healthcheck: *hc
    networks: [ltsearch-local]

volumes:
  ltsearch-data:
    name: ltsearch-local-data

networks:
  ltsearch-local:
    name: ltsearch-local
