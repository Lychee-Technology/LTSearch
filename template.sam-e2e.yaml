AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: LTSearch local SAM + Moto end-to-end template

Globals:
  Function:
    Timeout: 30
    MemorySize: 1024
    Architectures:
      - arm64
    Environment:
      Variables:
        AWS_ACCESS_KEY_ID: test
        AWS_SECRET_ACCESS_KEY: test
        AWS_DEFAULT_REGION: us-east-1
        AWS_REGION: us-east-1
        AWS_ENDPOINT_URL_S3: http://moto:5000
        AWS_ENDPOINT_URL_SQS: http://moto:5000

Resources:
  WriteFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageConfig:
        Command:
          - bootstrap
      Events:
        WriteApi:
          Type: Api
          Properties:
            Path: /write
            Method: post
      Environment:
        Variables:
          LTSEARCH_WRITE_S3_BUCKET: ltsearch-e2e-bucket
          LTSEARCH_WRITE_SQS_QUEUE_URL: http://moto:5000/123456789012/ltsearch-e2e-queue
    Metadata:
      Dockerfile: sam/write_lambda.Dockerfile
      DockerContext: .
      DockerTag: ltsearch-write-e2e

  BuildFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageConfig:
        Command:
          - bootstrap
      Environment:
        Variables:
          LTSEARCH_BUILD_S3_BUCKET: ltsearch-e2e-bucket
          LTSEARCH_BUILD_ARTIFACT_ROOT: /tmp/ltsearch-e2e-artifacts
          LTSEARCH_BUILD_EMBEDDING_PROVIDER: fixed
          LTSEARCH_BUILD_FIXED_EMBEDDING: 0.9,0.1,0.0
          LTSEARCH_BUILD_EMBEDDING_DIM: 3
          LTSEARCH_BUILD_LTEMBED_BUNDLE_DIR: /ltembed-assets
          LTSEARCH_BUILD_LTEMBED_MODEL_PATH: /ltembed-assets/model.ort
    Metadata:
      Dockerfile: sam/index_builder_lambda.Dockerfile
      DockerContext: .
      DockerTag: ltsearch-build-e2e

  QueryFunction:
    Type: AWS::Serverless::Function
    Properties:
      PackageType: Image
      ImageConfig:
        Command:
          - bootstrap
      Environment:
        Variables:
          LTSEARCH_QUERY_ARTIFACT_ROOT: /tmp/ltsearch-e2e-artifacts
          LTSEARCH_QUERY_S3_BUCKET: ltsearch-e2e-bucket
          LTSEARCH_QUERY_EMBEDDING_PROVIDER: fixed
          LTSEARCH_QUERY_FIXED_EMBEDDING: 0.9,0.1,0.0
          LTSEARCH_QUERY_LTEMBED_BUNDLE_DIR: /ltembed-assets
          LTSEARCH_QUERY_LTEMBED_MODEL_PATH: /ltembed-assets/model.ort
      Events:
        QueryApi:
          Type: Api
          Properties:
            Path: /query
            Method: post
    Metadata:
      Dockerfile: sam/query_lambda.Dockerfile
      DockerContext: .
      DockerTag: ltsearch-query-e2e
