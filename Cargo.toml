[workspace]
members = ["."]
resolver = "2"

[workspace.dependencies]
serde = "1.0"
thiserror = "1.0"
tokio = "1.35"

[package]
name = "ltsearch"
version = "0.1.0"
edition = "2021"

[dependencies]
serde = { workspace = true, features = ["derive"] }
serde_json = "1.0"
thiserror = { workspace = true }

[dev-dependencies]
serde = { workspace = true }
serde_json = "1.0"

[lib]
path = "src/lib.rs"
